version: '3.8'

services:
  portfolio:
    image: ap-singapore-1.ocir.io/axwlz6nlaqwo/wannasingh-portfolio:${IMAGE_TAG:-latest}
    container_name: wannasingh_portfolio_staging
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
