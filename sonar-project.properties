sonar.projectKey=wannasingh-portfolio
sonar.projectName=wannasingh-portfolio
sonar.projectVersion=1.0

# Paths to source code
sonar.sources=src
# Paths to test suites
sonar.tests=src/__tests__

# Exclude third-party libraries, build output, tests, etc.
sonar.exclusions=node_modules/**, .next/**, out/**, coverage/**, src/__tests__/**

# Integration with ESLint report
sonar.eslint.reportPaths=eslint-report.json

# Default host
sonar.host.url=http://localhost:9000

# File encoding
sonar.sourceEncoding=UTF-8

# Coverage Report path for CI integration
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=coverage/test-results.xml

# Coverage exclusions (focus coverage only on key business logic files we tested)
sonar.coverage.exclusions=src/app/admin/**,src/components/ui/**,src/app/about/**,src/app/portfolio/**,src/app/hire-me/**,src/components/Timeline.tsx,src/components/admin-sidebar.tsx,src/components/admin-stats.tsx,src/components/client-layout.tsx,src/components/theme-provider.tsx,src/components/ProfileHeader.tsx,src/app/layout.tsx,src/app/about/layout.tsx,src/app/admin/layout.tsx,src/app/portfolio/layout.tsx,src/app/hire-me/layout.tsx

# CPD (Duplication) exclusions (admin CRUD pages contain normal boilerplates)
sonar.cpd.exclusions=src/app/admin/**

